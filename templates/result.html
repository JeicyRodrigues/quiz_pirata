<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Resultado Pirata</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="result-card">
            <h2>Você é...</h2>
            
            <h1>{{ resultado.nome }}</h1>
            
            {% if resultado.img %}
            <img src="{{ resultado.img }}" alt="{{ resultado.nome }}" class="pirate-img">
            {% else %}
            <div style="width:200px; height:200px; background:#333; margin:auto;">Sem Imagem</div>
            {% endif %}

            <div class="question-block" style="margin-top: 20px;">
                <h3>Características:</h3>
                <p class="pirate-desc">"{{ resultado.desc }}"</p>
            </div>

            <a href="/">
                <button style="margin-top: 20px;">Refazer o Teste</button>
            </a>
        </div>
    </div>
</body>
</html>
